<mat-toolbar color="primary" data-cy="app-toolbar">
  <mat-icon>assignment</mat-icon>
  <span class="app-title">{{ title }}</span>
</mat-toolbar>

<mat-sidenav-container class="app-container" data-cy="app-sidenav-container">
  <mat-sidenav mode="side" opened class="app-sidenav" data-cy="app-sidenav">
    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active-link" data-cy="nav-dashboard">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard</span>
      </a>
      <a mat-list-item routerLink="/tasks" routerLinkActive="active-link" data-cy="nav-tasks">
        <mat-icon matListItemIcon>list</mat-icon>
        <span matListItemTitle>Tasks</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="app-content">
    <router-outlet />
  </mat-sidenav-content>
</mat-sidenav-container>
