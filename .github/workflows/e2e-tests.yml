name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      ui_base_url:
        description: "Override UI base URL (leave empty to boot the local Angular app)"
        required: false
        default: ""
  push:
    branches:
      - main
      - "feature/**"
    paths:
      - "e2e/**"
      - "src/frontend/**"
      - ".github/workflows/e2e-tests.yml"
  pull_request:
    paths:
      - "e2e/**"
      - "src/frontend/**"
      - ".github/workflows/e2e-tests.yml"

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright (chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: "true"
      UI_BASE_URL: ${{ inputs.ui_base_url != '' && inputs.ui_base_url || 'http://localhost:4200' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        if: ${{ inputs.ui_base_url == '' }}
        working-directory: src/frontend
        run: npm ci

      - name: Build and serve Angular app
        if: ${{ inputs.ui_base_url == '' }}
        working-directory: src/frontend
        run: |
          nohup npm start -- --host 0.0.0.0 --port 4200 > ../../ng-serve.log 2>&1 &
          echo "NG_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for Angular app
        if: ${{ inputs.ui_base_url == '' }}
        run: npx --yes wait-on http://localhost:4200 --timeout 180000

      - name: Install e2e dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: e2e
        run: npx playwright test

      - name: Stop Angular app
        if: ${{ always() && inputs.ui_base_url == '' && env.NG_PID != '' }}
        run: kill "${NG_PID}" 2>/dev/null || true

      - name: Upload Playwright report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload test results
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: |
            e2e/test-results
            ng-serve.log
          if-no-files-found: ignore
          retention-days: 14
